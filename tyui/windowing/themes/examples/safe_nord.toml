# safe_nord — Nord palette snapped onto the xterm-256 grid.
# Recognizably Nord (Polar Night base, Frost blues/cyans, Aurora accents) but
# coarser/more saturated than true Nord, because Nord's muted off-grid colours
# are rounded to exact xterm-256 entries. The payoff: it renders identically on
# 256-colour terminals (macOS Terminal.app) and truecolor terminals.

[theme]
name = "safe_nord"
[theme.borders]
focused = "double"
unfocused = "single"
[theme.pattern]
kind = "solid"

[styles."desktop.background"]
bg = "#303030"
[styles."desktop.pattern"]
fg = "#3a3a3a"
bg = "#303030"

[styles."window.border.focused"]
fg = "#87d7d7"
bg = "#303030"
bold = true
[styles."window.border.unfocused"]
fg = "#5f87af"
bg = "#303030"

[styles."window.title.focused"]
fg = "#87d7d7"
bg = "#303030"
bold = true
[styles."window.title.unfocused"]
fg = "#5f87af"
bg = "#303030"
[styles."window.subtitle"]
fg = "#5f87af"
bg = "#303030"

[styles."window.content"]
fg = "#d7d7d7"
bg = "#3a3a3a"

[styles."panel.file.dir"]
fg = "#87afd7"
bold = true
[styles."panel.file.symlink"]
fg = "#87d7d7"
[styles."panel.file.executable"]
fg = "#afd787"
bold = true
[styles."panel.file.archive"]
fg = "#af5f5f"
[styles."panel.file.image"]
fg = "#af87af"
[styles."panel.file.media"]
fg = "#d787af"
[styles."panel.file.document"]
fg = "#d7d787"
[styles."panel.file.source"]
fg = "#d7d787"
[styles."panel.file.config"]
fg = "#87afaf"
[styles."panel.file.hidden"]
